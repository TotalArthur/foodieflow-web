<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FoodieFlow Assistant — What Can I Make With This?</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream:     hsl(38, 45%, 96%);
    --card:      hsl(0, 0%, 100%);
    --fore:      hsl(222, 47%, 13%);
    --muted:     hsl(215, 16%, 45%);
    --gold:      hsl(42, 90%, 52%);
    --gold-dark: hsl(38, 75%, 34%);
    --gold-lt:   hsl(42, 90%, 94%);
    --blue:      hsl(205, 68%, 50%);
    --blue-lt:   hsl(205, 55%, 92%);
    --border:    hsl(210, 28%, 88%);
    --good:      hsl(150, 55%, 42%);
    --rose:      hsl(358, 62%, 46%);
    --radius:    1.1rem;
  }
  html, body { height: auto; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--card);
    color: var(--fore);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .ffa { max-width: 720px; margin: 0 auto; padding: 26px 24px 28px; }

  /* HEADER */
  .ffa-head { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .ffa-head svg { width: 22px; height: 22px; flex-shrink: 0; }
  .ffa-head h2 { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.01em; }
  .ffa-sub { color: var(--muted); font-size: 0.88rem; margin: 4px 0 20px; }

  /* PICKER */
  .ffa-label { font-size: 0.72rem; font-weight: 800; letter-spacing: 0.07em; text-transform: uppercase; color: var(--gold-dark); margin-bottom: 10px; }
  .ffa-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(102px, 1fr)); gap: 10px; margin-bottom: 22px; }
  .ffa-tile {
    position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    background: var(--cream); border: 2px solid var(--border); border-radius: 14px;
    padding: 14px 8px 12px; cursor: pointer; font: inherit; color: var(--fore);
    transition: background 0.15s, border-color 0.15s, transform 0.1s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .ffa-tile:hover { border-color: var(--gold); }
  .ffa-tile:active { transform: scale(0.97); }
  .ffa-tile svg { width: 28px; height: 28px; color: var(--gold-dark); transition: color 0.15s; }
  .ffa-tile span { font-size: 0.72rem; font-weight: 700; text-align: center; line-height: 1.25; }
  .ffa-tile.on {
    background: var(--gold); border-color: var(--gold-dark);
    box-shadow: 0 6px 16px rgba(190, 140, 10, 0.28);
  }
  .ffa-tile.on svg { color: var(--fore); }
  .ffa-check {
    position: absolute; top: -7px; right: -7px; width: 20px; height: 20px; border-radius: 50%;
    background: var(--fore); color: #fff; display: none; align-items: center; justify-content: center;
    box-shadow: 0 0 0 2px #fff;
  }
  .ffa-tile.on .ffa-check { display: flex; }
  .ffa-check svg { width: 11px; height: 11px; color: #fff; }

  /* GENERATE BUTTON */
  .ffa-go {
    display: block; width: 100%; border: none; border-radius: 100px; padding: 16px;
    font: inherit; font-size: 0.95rem; font-weight: 800; letter-spacing: 0.03em; text-transform: uppercase;
    background: var(--gold); color: #191305; cursor: pointer;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 10px 24px rgba(190, 140, 10, 0.28);
  }
  .ffa-go:not(:disabled):hover { background: hsl(42, 90%, 47%); transform: translateY(-1px); }
  .ffa-go:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; box-shadow: none; }

  /* THINKING STATE */
  .ffa-thinking { display: none; align-items: center; justify-content: center; gap: 10px; padding: 26px 0 6px; color: var(--muted); font-size: 0.9rem; font-style: italic; }
  .ffa-thinking.show { display: flex; }
  .ffa-dots { display: flex; gap: 5px; }
  .ffa-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); animation: ffaBounce 1s infinite ease-in-out; }
  .ffa-dots span:nth-child(2) { animation-delay: 0.15s; }
  .ffa-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes ffaBounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.5; } 40% { transform: translateY(-6px); opacity: 1; } }

  /* RESULT CARD */
  .ffa-result { display: none; margin-top: 22px; opacity: 0; transform: translateY(6px); transition: opacity 0.35s ease, transform 0.35s ease; }
  .ffa-result.show { display: block; opacity: 1; transform: translateY(0); }
  .ffa-card {
    background: var(--cream); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 22px; display: flex; gap: 20px; align-items: center;
  }
  .ffa-card .ffa-eyebrow { font-size: 0.68rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold-dark); margin-bottom: 6px; }
  .ffa-card svg.ffa-illus { width: 108px; height: 108px; flex-shrink: 0; }
  .ffa-card h3 { font-size: 1.18rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.01em; }
  .ffa-card p { font-size: 0.92rem; color: var(--fore); line-height: 1.65; }
  .ffa-again { display: inline-block; margin-top: 14px; font-size: 0.8rem; font-weight: 700; color: var(--blue); background: none; border: none; cursor: pointer; text-decoration: underline; padding: 0; font-family: inherit; }

  @media (max-width: 480px) {
    .ffa-card { flex-direction: column; align-items: flex-start; text-align: left; }
    .ffa-card svg.ffa-illus { width: 96px; height: 96px; }
  }

  /* BOTTOM CTA — matches the blog's dark CTA panel */
  .ffa-cta { margin-top: 26px; background: hsl(222, 47%, 10%); border-radius: var(--radius); padding: 24px 22px; text-align: center; }
  .ffa-cta p { color: rgba(255,255,255,0.85); font-size: 0.92rem; margin-bottom: 14px; }
  .ffa-store-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .ffa-store-btn { display: inline-flex; align-items: center; gap: 8px; background: #fff; color: var(--fore); padding: 10px 18px; border-radius: 10px; font-weight: 700; font-size: 0.85rem; text-decoration: none; transition: transform 0.15s; }
  .ffa-store-btn:hover { transform: translateY(-2px); }
</style>
</head>
<body>
<div class="ffa">

  <div class="ffa-head">
    <svg viewBox="0 0 24 24" fill="var(--gold)" aria-hidden="true"><path d="M12 2l1.8 5.6L19.4 9l-5.6 1.8L12 16.4l-1.8-5.6L4.6 9l5.6-1.8L12 2z"/><path d="M19 15l.9 2.8L22.7 18.7l-2.8.9L19 22.4l-.9-2.8-2.8-.9 2.8-.9L19 15z" opacity="0.6"/></svg>
    <h2>FoodieFlow Assistant</h2>
  </div>
  <p class="ffa-sub">Tell it what's hanging around in your fridge — it'll tell you what to make.</p>

  <p class="ffa-label">What have you got left?</p>
  <div class="ffa-grid" id="ffaGrid" role="group" aria-label="Select the leftovers you have"></div>

  <button class="ffa-go" id="ffaGo" disabled>Generate Idea</button>

  <div class="ffa-thinking" id="ffaThinking">
    <div class="ffa-dots"><span></span><span></span><span></span></div>
    <span>Foodie Assistant is thinking&hellip;</span>
  </div>

  <div class="ffa-result" id="ffaResult">
    <div class="ffa-card">
      <div id="ffaIllus"></div>
      <div>
        <p class="ffa-eyebrow">Tonight's idea</p>
        <h3 id="ffaName"></h3>
        <p id="ffaMethod"></p>
        <button class="ffa-again" id="ffaAgain">&larr; Try a different combo</button>
      </div>
    </div>
  </div>

  <div class="ffa-cta">
    <p>Like this? FoodieFlow can save recipes like this one for good.</p>
    <div class="ffa-store-btns">
      <a href="https://apps.apple.com/us/app/foodieflow-meal-planner/id6760259767" class="ffa-store-btn" target="_blank" rel="noopener noreferrer">
        <svg width="16" height="19" viewBox="0 0 814 1000" fill="#111" aria-hidden="true"><path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 790.7 0 663 0 541.8c0-207.5 135.4-317.3 269-317.3 70.1 0 128.4 46.4 172.5 46.4 42.8 0 109.6-49 192.5-49 30.9 0 113.8 2.6 168.9 98.3zm-234.8-181.4c31.3-36.9 53.7-88.1 53.7-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 134.9-71.3z"/></svg>
        App Store
      </a>
      <a href="https://play.google.com/store/apps/details?id=com.foodieflow.app" class="ffa-store-btn" target="_blank" rel="noopener noreferrer">
        <svg width="16" height="18" viewBox="0 0 24 24" aria-hidden="true"><path d="M3.18 23.76a2 2 0 0 0 2.08-.21l11.39-6.58-3.22-3.22L3.18 23.76z" fill="#111"/><path d="M21.28 10.4 17.64 8.3 14.1 11.86l3.54 3.54 3.64-2.1a2 2 0 0 0 0-3.46z" fill="#111"/><path d="M3.18.24A2 2 0 0 0 2 2v20a2 2 0 0 0 1.18 1.76L13.38 12 3.18.24z" fill="#111"/><path d="M5.26.45 16.65 7.03 13.38 10.3 3.18.24A2 2 0 0 1 5.26.45z" fill="#111"/></svg>
        Google Play
      </a>
    </div>
  </div>

</div>

<script>
(function () {
  'use strict';

  /* ---------- tile icons (single-colour line art, recolours via currentColor) ---------- */
  var ICONS = {

  };

  var LABELS = {

    eggs: 'Boiled Eggs', beans: 'Tinned Beans', sauce: 'Leftover Sauce / Gravy'
  };
  /* Natural-sentence versions of the labels above, for the dynamic "you've also got..." clause. */
  var LOWER_LABELS = {

    veg: 'mixed veg', bread: 'stale bread', cheese: 'cheese ends', bacon: 'cooked bacon',
    eggs: 'boiled eggs', beans: 'tinned beans', sauce: 'leftover sauce or gravy'
  };
  /* A short, casual stir-in suggestion for each ingredient, used when it's selected
     but isn't part of the matched dish — so nothing picked gets silently ignored. */
  var EXTRAS = {
    rice: "stir a handful of the rice through to bulk it out",
    chicken: "shred the chicken in too, right at the end so it doesn't dry out",
    mash: "a spoonful of the mash stirred through will thicken it up nicely",
    pasta: "chuck the pasta in as well, it'll go further",
    veg: "throw in whatever veg needs using up",
    bread: "a slice of toasted stale bread on the side never hurts",
    cheese: "grate the cheese ends over the top to finish",
    bacon: "fry the bacon off and scatter it over the top",
    eggs: "a chopped boiled egg on top adds some protein",
    beans: "tip in the tinned beans for extra body",
    sauce: "loosen it all with a splash of the leftover sauce or gravy"
  };
  var ORDER = ['rice','chicken','mash','pasta','veg','bread','cheese','bacon','eggs','beans','sauce'];

  /* ---------- result illustrations (flat, warm-palette SVGs) ---------- */

  function plate(inner) {

    cheeseBoard: plate(
      '<rect x="26" y="46" width="68" height="28" rx="6" fill="' + BROWN + '" opacity="0.8"/>' +

  var MYSTERY = { name: 'The Countertop Special',
    method: "Honestly, that combo doesn't scream one specific dish — so just wing it. Heat a pan, add a splash of oil, throw everything in together, season well, and taste as you go. That's most weeknight dinners anyway.",
    svg: 'mystery' };

  function matches(need, selected) {
    for (var j = 0; j < need.length; j++) { if (!selected.has(need[j])) return false; }
    return true;
  }

  function humanizeList(arr) {
    if (arr.length === 1) return arr[0];
    if (arr.length === 2) return arr[0] + ' and ' + arr[1];
    return arr.slice(0, -1).join(', ') + ' and ' + arr[arr.length - 1];
  }

  /* Anything picked that the matched dish doesn't already use gets folded in here,
     instead of just being dropped on the floor once a rule matches. */
  function buildExtrasClause(leftoverKeys) {
    if (!leftoverKeys.length) return '';
    var names = leftoverKeys.map(function (k) { return LOWER_LABELS[k]; });
    var clauses = leftoverKeys.map(function (k) { return EXTRAS[k]; });
    return " You've also got " + humanizeList(names) + " kicking around — " + clauses.join('; ') + '.';
  }

  function pickRecipe(selected) {
    /* Score every rule that's fully covered by what's selected, and take the one
       that explains the MOST of the picks (need.length), not just the first hit
       in list order. rice+chicken+veg beats rice+veg beats rice alone this way,
       regardless of how the RULES array happens to be ordered. */
    var best = null;
    for (var i = 0; i < RULES.length; i++) {
      var rule = RULES[i];
      if (matches(rule.need, selected) && (!best || rule.need.length > best.need.length)) best = rule;
    }
    if (!best) return MYSTERY;

    var leftover = [];
    selected.forEach(function (k) { if (best.need.indexOf(k) === -1) leftover.push(k); });

    /* Picked four or more things but the closest match only explains one of them?
       That's too scattered to pass off as one clean dish — be honest about it
       instead of stretching a single-ingredient idea to cover everything. */
    if (best.need.length === 1 && selected.size >= 4) return MYSTERY;

    return { name: best.name, method: best.method + buildExtrasClause(leftover), svg: best.svg };
  }

  /* ---------- build the picker grid ---------- */
  var grid = document.getElementById('ffaGrid');
  var selected = new Set();

  ORDER.forEach(function (key) {
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'ffa-tile';
    btn.setAttribute('aria-pressed', 'false');
    btn.innerHTML = ICONS[key] + '<span>' + LABELS[key] + '</span>' +
      '<span class="ffa-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 12 9 17 20 6"/></svg></span>';
    btn.addEventListener('click', function () {
      if (selected.has(key)) { selected.delete(key); btn.classList.remove('on'); btn.setAttribute('aria-pressed', 'false'); }
      else { selected.add(key); btn.classList.add('on'); btn.setAttribute('aria-pressed', 'true'); }
      go.disabled = selected.size === 0;
      reportHeight();
    });
    grid.appendChild(btn);
  });

  var go = document.getElementById('ffaGo');
  var thinking = document.getElementById('ffaThinking');
  var result = document.getElementById('ffaResult');
  var again = document.getElementById('ffaAgain');

  go.addEventListener('click', function () {
    if (selected.size === 0) return;
    result.classList.remove('show');
    go.disabled = true;
    thinking.classList.add('show');
    reportHeight();

    var chosen = new Set(selected);
    setTimeout(function () {
      var recipe = pickRecipe(chosen);
      document.getElementById('ffaName').textContent = recipe.name;
      document.getElementById('ffaMethod').textContent = recipe.method;
      document.getElementById('ffaIllus').innerHTML = ILLUS[recipe.svg];
      thinking.classList.remove('show');
      result.classList.add('show');
      go.disabled = selected.size === 0;
      reportHeight();
    }, 1300 + Math.random() * 400);
  });

  again.addEventListener('click', function () {
    result.classList.remove('show');
    reportHeight();
  });

  /* ---------- tell the parent page how tall we are, so the iframe can resize ---------- */
  function reportHeight() {
    try {
      var h = document.documentElement.scrollHeight;
      window.parent.postMessage({ foodieflowAssistantHeight: h }, '*');
    } catch (e) { /* standalone, no parent to report to */ }
  }
  window.addEventListener('load', reportHeight);
  window.addEventListener('resize', reportHeight);
  setTimeout(reportHeight, 300);
})();
</script>
