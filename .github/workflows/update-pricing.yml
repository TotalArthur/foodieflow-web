name: Sync pricing from RevenueCat

on:
  schedule:
    - cron: '0 3 * * *'   # daily at 03:00 UTC
  workflow_dispatch:        # allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Fetch current price from RevenueCat (pure Python, no curl) ──────────
      - name: Fetch pricing from RevenueCat
        env:
          RC_SECRET: ${{ secrets.REVENUECAT_SECRET_KEY }}
        run: python3 .github/fetch-pricing.py

      # ── Regenerate favicon.ico whenever logo.png changes ────────────────────
      - name: Generate favicon.ico from logo.png
        run: |
          pip install Pillow --quiet
          python3 .github/generate-favicon.py

      # ── Commit anything that changed ────────────────────────────────────────
      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pricing.json favicon.ico
          if git diff --staged --quiet; then
            echo "Nothing to commit — pricing and assets are already up to date."
          else
            PRICE=$(python3 -c "
import json
d = json.load(open('pricing.json'))
print(f\"{d['base_currency']} {d['base_amount']}\")
")
            git commit -m "chore: sync pricing (${PRICE}) and regenerate favicon"
            git push
          fi
