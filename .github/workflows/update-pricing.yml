name: Sync pricing from RevenueCat

on:
  schedule:
    - cron: '0 3 * * *'   # daily at 03:00 UTC
  workflow_dispatch:        # allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch price from RevenueCat v2 API
        id: price
        env:
          RC_SECRET: ${{ secrets.REVENUECAT_SECRET_KEY }}
        run: |
          set -euo pipefail

          # 1. Discover the project ID
          PROJECTS=$(curl -sf \
            -H "Authorization: Bearer $RC_SECRET" \
            "https://api.revenuecat.com/v2/projects")
          PROJECT_ID=$(echo "$PROJECTS" | jq -r '.items[0].id')
          echo "project_id=$PROJECT_ID"

          # 2. Fetch production offerings
          OFFERINGS=$(curl -sf \
            -H "Authorization: Bearer $RC_SECRET" \
            "https://api.revenuecat.com/v2/projects/$PROJECT_ID/offerings?environment=production")

          # 3. Extract price:  current offering → $rc_monthly package
          #    Prefer the App Store (iOS) product; fall back to the first product listed.
          #    pricing_phases[-1] is the base recurring phase (after any trial phases).
          PRICE_JSON=$(echo "$OFFERINGS" | jq -c '
            .items[]
            | select(.is_current == true)
            | .packages[]
            | select(.lookup_key == "$rc_monthly")
            | .products
            | (map(select(.app.store == "app_store")) | first) // first
            | .default_purchase_option.pricing_phases[-1].price
          ' | head -1)

          echo "price_json=$PRICE_JSON" >> "$GITHUB_OUTPUT"

      - name: Write pricing.json
        env:
          PRICE_JSON: ${{ steps.price.outputs.price_json }}
        run: |
          python3 - <<'PYEOF'
          import json, os, datetime

          price = json.loads(os.environ['PRICE_JSON'])

          # RevenueCat stores amounts in minor currency units (e.g. 399 = £3.99)
          amount_major = round(price['amount'] / 100, 2)

          pricing = {
              "base_currency": price['currency'],
              "base_amount":   amount_major,
              "period":        "month",
              "last_updated":  datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
          }

          with open('pricing.json', 'w') as f:
              json.dump(pricing, f, indent=2)
              f.write('\n')

          print(f"Wrote: {price['currency']} {amount_major}")
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pricing.json
          if git diff --staged --quiet; then
            echo "No pricing changes — nothing to commit."
          else
            git commit -m "chore: update pricing from RevenueCat"
            git push
          fi
